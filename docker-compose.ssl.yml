services:
  app:
    build: .
    container_name: ipmanager_app
    # No longer expose port to host directly — Nginx handles it
    expose:
      - "80"
    environment:
      - DB_HOST=db
      - DB_NAME=ipmanage
      - DB_USER=ipmanager
      - DB_PASS=ipmanager_pass
      - DISCOVERY_AGGRESSIVE_MODE=1
      - ENABLE_NMAP_FALLBACK=1
      - OFFLINE_FAIL_THRESHOLD=3
      - DOCKER_ENV=1
      - APP_URL=https://ipmanager.local
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www/html
    networks:
      - ipmanage_net

  nginx:
    image: nginx:alpine
    container_name: ipmanager_nginx
    ports:
      - "2025:443"
      - "2080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - ipmanage_net

  db:
    image: mariadb:10.11
    container_name: ipmanager_db
    ports:
      - "3308:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=root_password_secure
      - MARIADB_DATABASE=ipmanage
      - MARIADB_USER=ipmanager
      - MARIADB_PASSWORD=ipmanager_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/database.sql:/docker-entrypoint-initdb.d/database.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password_secure" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ipmanage_net

  redis:
    image: redis:7-alpine
    container_name: ipmanager_redis
    networks:
      - ipmanage_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 3

networks:
  ipmanage_net:
    driver: bridge

volumes:
  db_data:
